name: 每日更新橙攝價目資料

on:
  workflow_dispatch:
  schedule:
    # 03:17 UTC = 台灣時間 11:17（不排在整點，降低 GitHub 排程延遲機率）
    - cron: '17 3 * * *'

permissions:
  contents: write

concurrency:
  group: ogphoto-catalog-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: 取得網站原始碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 更新公開價目資料
        run: node scripts/update-catalog.mjs

      - name: 檢查資料完整性
        run: node scripts/check-catalog.mjs

      - name: 寫回更新資料
        run: |
          git config user.name "ogphoto-price-bot"
          git config user.email "ogphoto-price-bot@users.noreply.github.com"
          git add app/data/catalog.json app/data/version.json
          git diff --cached --quiet || git commit -m "chore: 更新橙攝公開價目資料"
          git push
